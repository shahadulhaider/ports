version: 2

builds:
  - main: ./cmd/ports
    binary: ports
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore\(deps\)'
      - '^ci:'

brews:
  - name: ports
    repository:
      owner: shahadulhaider
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: https://github.com/shahadulhaider/ports
    description: A fast, keyboard-driven TUI for exploring listening ports on macOS and Linux
    license: GPL-3.0
    install: |
      bin.install "ports"
    test: |
      system "#{bin}/ports", "--version"
